name: Trigger auto deployment for contextintel

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ deployment ]
    paths:
    - '**'
    - '.github/workflows/contextintel-AutoDeployTrigger-7581f408-545b-419d-a0dc-d071bc8e2c99.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.CONTEXTINTEL_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.CONTEXTINTEL_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.CONTEXTINTEL_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: 
          registryUsername: ${{ secrets.CONTEXTINTEL_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.CONTEXTINTEL_REGISTRY_PASSWORD }}
          containerAppName: contextintel
          resourceGroup: miniproject_deployment_demo
          imageToBuild: default/[parameters('containerAppName')]:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


